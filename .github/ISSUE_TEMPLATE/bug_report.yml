name: Bug report
description: Something is broken or behaves incorrectly
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time. Please include a **minimal repro** and your environment.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong in one or two sentences?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Command(s) you ran, URL or fixture if relevant.
      placeholder: |
        ai-context "https://..." --summary
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version / commit
      description: Output of `ai-context --help` header if present, or `git rev-parse --short HEAD`
  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: e.g. 3.12.2
  - type: dropdown
    id: os
    attributes:
      label: OS
      options:
        - Linux
        - macOS
        - Windows
        - Other
